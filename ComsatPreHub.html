<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMSATSPREPHUB</title>
    <style>
        ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
        }
        li{
            float: inline-start;
        }

        li a{
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        li a:hover{
            background-color: #d01818;
        }
        .div{
            background-color: #f2f2f2;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <style>
        li {
            display: flex;
            display: inline;
            margin-right: 20px;
        }
    </style>
    <main>
        <h1 style="color: #1a73e8;"><strong>COMSATSPREPHUB</strong></h1>
        <p>Welcome to the COMSATSPREPHUB!</p>
        <div id="nav">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="subjects.html">Subjects</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>

    </div>

    <button id="myButton">Click Me</button>
    </main>

    <script>
        // JavaScript code can be added here if needed
        document.addEventListener('DOMContentLoaded', function() {
            console.log('COMSATSPREPHUB page loaded');
        });

        document.getElementById('nav').addEventListener('click', function(event) {
            if (event.target.tagName === 'A') {
                console.log('Navigation link clicked:', event.target.href);
            }
        });

        document.getElementById('myButton').addEventListener('click', function() {
            alert('Button clicked!');
        });
    </script>
    
</body>
</html>
