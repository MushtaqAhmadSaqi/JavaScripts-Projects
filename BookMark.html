<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Bookmarks</h1>
    <h2>Primary Bookmarks</h2>
    <ol id="primary">
        <li><a href="https://www.google.com" target="_blank">Google</a></li>
        <li><a href="https://www.wikipedia.org" target="_blank">Wikipedia</a></li>
        <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
        <li><a href="https://www.reddit.com" target="_blank">Reddit</a></li>
        <li><a href="https://www.twitter.com" target="_blank">Twitter</a></li>
    </ol>

    <h2 style="color: aqua;">Secondary Bookmarks</h2>
    <ul>
        <li><a href="https://www.stackoverflow.com" target="_blank">Stack Overflow</a></li>
        <li><a href="https://www.github.com" target="_blank">GitHub</a></li>
    </ul>
    <img src="https://www.example.com/image.jpg" alt="Example Image" width="400" height="200">

    <table>
        <caption style="color: bisque;">Studnet Details</caption>
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Class</th>
                <th>Section</th>
                <th>Subject</th>
            </tr>
            <tr>
                <td>Saqi</td>
                <td>AI</td>
                <td>B</td>
                <td>Biology</td>
            </tr>

    </table>
    <ol>
                <li>Apple</li>
                <li>Bananoa</li>
                <li>Mango</li>
            </ol>
</body>
</html>
